name: CI/CD Pipeline - Pacientes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./ms-pacientes

      # IE6: Validación automatizada. Si falla, rompe el pipeline protegiendo producción.
      - name: Ejecutar Pruebas Unitarias
        run: npm test
        working-directory: ./ms-pacientes

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # IE5: Políticas de cumplimiento y calidad de código
      - name: Análisis de SonarQube
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}