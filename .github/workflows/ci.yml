name: CI/CD Pipeline - Pacientes

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al wrapper de Maven
        run: chmod +x mvnw

      # IE6: Compilar y ejecutar pruebas unitarias de Java
      - name: Ejecutar Pruebas
        run: ./mvnw clean verify # Usamos verify para generar reportes necesarios para Sonar

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Dar permisos de ejecución a mvnw
        run: chmod +x mvnw

      - name: Análisis de SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw clean verify sonar:sonar -Dsonar.projectKey=MechaTeemo1412_Ev3_Devops -Dsonar.organization=mechateemo1412 -Dsonar.host.url=https://sonarcloud.io
