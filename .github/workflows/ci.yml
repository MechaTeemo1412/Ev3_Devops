name: CI/CD Pipeline - Pacientes

on:
  push:
    branches:
      - main
      - David_Soto
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al wrapper de Maven
        run: chmod +x mvnw

      - name: Ejecutar Pruebas
        run: ./mvnw clean verify

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos de ejecución a mvnw
        run: chmod +x mvnw

      - name: Análisis de SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw clean verify sonar:sonar 
          -Dsonar.projectKey=MechaTeemo1412_Ev3_Devops 
          -Dsonar.organization=mechateemo1412 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.java.binaries=target/classes

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/David_Soto'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Construir el archivo JAR de producción
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- DOCKER HUB ---
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extraer Metadata de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pacientes-api
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - name: Construir imagen y subir a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- AWS (ECR + ECS) ---
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # [MONITOREO] Activa Container Insights en CloudWatch para el clúster remoto de AWS
      - name: Garantizar Monitoreo CloudWatch en el Clúster
        run: |
          aws ecs update-cluster-settings --cluster ${{ vars.ECS_CLUSTER_NAME }} --settings name=containerInsights,value=enabled

      - name: Build de imagen y push a Amazon ECR
        run: |
          docker build -t pacientes-api .
          docker tag pacientes-api:latest ${{ vars.ECR_REPO_URL_PACIENTE }}:latest
          docker push ${{ vars.ECR_REPO_URL_PACIENTE }}:latest

      - name: Descargar Task Definition actual desde ECS
        run: |
          aws ecs describe-task-definition --task-definition ${{ vars.ECS_TASK_DEFINITION_NAME }} --query taskDefinition > task-definition.json

      - name: Actualizar Tag de la imagen en la Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ms-paciente
          image: ${{ vars.ECR_REPO_URL_PACIENTE }}:latest

      - name: Desplegar nueva Task Definition en el Servicio ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_NAME }}
          cluster: ${{ vars.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true