name: CI/CD Pipeline - Pacientes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      # Configuramos Java en lugar de Node
      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21' # Cambia a 11 o 21 si usas otra versión
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al wrapper de Maven
        run: chmod +x mvnw

      # IE6: Compilar y ejecutar pruebas unitarias de Java
      - name: Ejecutar Pruebas
        run: ./mvnw clean test

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # IE5: SonarQube para proyectos Maven
      - name: Análisis de SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=TU_PROJECT_KEY_AQUI