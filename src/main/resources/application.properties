spring.application.name=ms-pacientes
server.port=8081

### CONFIGURACIÓN BASE DE DATOS H2 ###
spring.datasource.url=jdbc:h2:mem:nexushealthdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

### CONSOLA H2 (Para revisar la BD desde el navegador) ###
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.hikari.maximum-pool-size=2
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

### HIBERNATE & JPA ###
# Se cambia a 'update' o 'create-drop' porque H2 en memoria nace vacía en cada ejecución
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

### ACTUATOR & PROMETHEUS ###
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
server.servlet.context-path=/
management.endpoints.web.base-path=/actuator